services:
  ollama:
    image: ollama/ollama:latest
    container_name: ai-ollama
    volumes:
      - ollama_data:/root/.ollama
    environment:
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen2.5-coder:1.5b}
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        ollama serve &
        SERVE_PID=$$!
        echo "==> Aguardando ollama serve subir..."
        until ollama list >/dev/null 2>&1; do
          sleep 2
        done
        echo "==> Garantindo modelo $$OLLAMA_MODEL..."
        ollama pull "$$OLLAMA_MODEL"
        wait $$SERVE_PID
    healthcheck:
      test: ["CMD-SHELL", "ollama list >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 30
    networks:
      - internal

  web:
    build: .
    container_name: ai-service
    depends_on:
      ollama:
        condition: service_healthy
    ports:
      - "8003:8003"
    env_file:
      - .env
    volumes:
      - .:/app
    networks:
      - internal
      - atlas-network

volumes:
  ollama_data:

networks:
  internal:
  atlas-network:
    name: atlas-network
    external: true
